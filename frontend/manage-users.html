<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PixShare — Manage Users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <style>

    body { background: var(--ink); }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 1.75rem 5rem;
    }

    /* Page header */
    .page-hdr {
      margin-bottom: 2.5rem;
      animation: fadeUp 0.7s ease both;
    }

    .page-hdr-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
      margin-bottom: 0.4rem;
    }

    .page-hdr h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 700;
      line-height: 1;
    }

    .user-total {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--gold);
      font-size: 0.8rem; font-weight: 600;
      padding: 0.4rem 1rem; border-radius: 100px;
      letter-spacing: 0.06em;
      margin-top: 0.4rem;
    }

    .page-hdr p {
      color: var(--muted); font-size: 0.9rem; font-weight: 300;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Users container */
    .users-container {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .users-container-hdr {
      padding: 1.2rem 1.6rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.02);
    }
    .users-hdr-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }
    .users-hdr-actions {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }

    /* User row */
    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.6rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.22s;
      animation: fadeUp 0.5s ease both;
    }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: rgba(255,255,255,0.03); }

    .user-left { display: flex; align-items: center; gap: 1rem; }

    .user-avatar {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--panel3), var(--panel2));
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700;
      color: var(--teal);
      font-family: 'Cormorant Garamond', serif;
      flex-shrink: 0;
    }

    .user-info {}
    .user-name {
      font-weight: 600; font-size: 0.95rem;
      color: var(--text); margin-bottom: 0.2rem;
    }
    .user-meta {
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.76rem; color: var(--muted);
    }
    .user-id-tag {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 0.12rem 0.55rem; border-radius: 6px;
      font-size: 0.72rem; font-weight: 600;
      color: var(--muted); font-family: monospace;
    }

    .user-right { display: flex; align-items: center; gap: 0.75rem; }

    .consumer-badge {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.09em;
      text-transform: uppercase;
      background: var(--teal-bg);
      border: 1px solid rgba(77,217,200,0.2);
      color: var(--teal);
      padding: 0.3rem 0.8rem; border-radius: 100px;
    }

    .del-btn {
      padding: 0.42rem 0.95rem;
      background: var(--danger-bg);
      border: 1px solid rgba(224,92,92,0.2);
      border-radius: 9px;
      color: var(--danger);
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.22s;
    }
    .del-btn:hover { background: rgba(224,92,92,0.2); border-color: rgba(224,92,92,0.4); }

    /* Empty state */
    .users-empty {
      padding: 5rem 2rem;
      text-align: center;
    }
    .users-empty .ei { font-size: 3.5rem; opacity: 0.3; margin-bottom: 1rem; display: block; }
    .users-empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; margin-bottom: 0.5rem; }
    .users-empty p  { font-size: 0.88rem; color: var(--muted); }

    @media(max-width:600px) {
      .user-meta { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
      .consumer-badge { display: none; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="Creator.html" class="brand">
    <div class="brand-gem">📸</div>
    PixShare
  </a>
  <div class="nav-right">
    <span class="nav-username" id="nav-username"></span>
    <span class="role-badge creator">Creator</span>
    <a href="Creator.html" class="btn btn-ghost btn-sm">← Dashboard</a>
    <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Sign Out</button>
  </div>
</nav>

<div class="page">

  <div class="page-hdr">
    <div class="page-hdr-top">
      <h1>Manage Users</h1>
      <span class="user-total" id="user-total" style="display:none">
        👥 <span id="user-count-num">0</span> users
      </span>
    </div>
    <p>View and manage all consumer accounts on the platform.</p>
  </div>

  <div class="users-container" id="users-container">
    <div class="loader" style="padding:4rem;"><div class="spinner"></div></div>
  </div>

</div>

<div id="toast-container"></div>

<script src="config.js"></script>
<script src="Auth.js"></script>
<script>
  if (!Auth.loggedIn()) location.href = 'Login.html';
  if (Auth.role() !== 'creator') location.href = 'Gallery.html';
  document.getElementById('nav-username').textContent = Auth.username();

  async function loadUsers() {
    const container = document.getElementById('users-container');
    try {
      const { ok, data } = await apiFetch('/users', { headers: Auth.headers() });
      if (!ok) {
        container.innerHTML = `<div class="users-empty">
          <span class="ei">⚠️</span><h3>Failed to load users</h3>
          <p>${data?.message || 'Please try again later.'}</p></div>`;
        return;
      }
      if (!data.length) {
        container.innerHTML = `<div class="users-empty">
          <span class="ei">👥</span><h3>No users yet</h3>
          <p>When users sign up as explorers, they'll appear here.</p></div>`;
        document.getElementById('user-total').style.display = 'inline-flex';
        return;
      }

      const total = document.getElementById('user-total');
      total.style.display = 'inline-flex';
      document.getElementById('user-count-num').textContent = data.length;

      const rows = data.map((user, idx) => {
        const initial = user.username.charAt(0).toUpperCase();
        const delay = Math.min(idx * 0.05, 0.5);
        const joined = user.created_at
          ? new Date(user.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
          : '—';
        return `
          <div class="user-row" style="animation-delay:${delay}s">
            <div class="user-left">
              <div class="user-avatar">${initial}</div>
              <div class="user-info">
                <div class="user-name">${esc(user.username)}</div>
                <div class="user-meta">
                  <span class="user-id-tag">#${user.id}</span>
                  <span>Joined ${joined}</span>
                </div>
              </div>
            </div>
            <div class="user-right">
              <span class="consumer-badge">Explorer</span>
              <button class="del-btn" onclick="deleteUser(${user.id}, '${esc(user.username)}')">Delete</button>
            </div>
          </div>`;
      }).join('');

      container.innerHTML = `
        <div class="users-container-hdr">
          <span class="users-hdr-label">User</span>
          <span class="users-hdr-actions">Actions</span>
        </div>
        ${rows}`;

    } catch(err) {
      container.innerHTML = `<div class="users-empty">
        <span class="ei">⚠️</span><h3>Error</h3>
        <p>${err.message || 'Network error'}</p></div>`;
    }
  }

  async function deleteUser(userId, username) {
    if (!confirm(`Delete user "${username}"?\n\nThis will permanently remove the account, comments, and ratings.`)) return;
    try {
      const { ok, data } = await apiFetch(`/users/${userId}`, { method: 'DELETE', headers: Auth.headers() });
      if (ok) { toast(data.message || 'User deleted', 'success'); loadUsers(); }
      else toast(data.message || 'Failed to delete user', 'error');
    } catch { toast('Network error', 'error'); }
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toast(msg, type) {
    const t = document.createElement('div');
    t.className = `toast ${type}`; t.textContent = msg;
    let c = document.getElementById('toast-container');
    if (!c) { c = document.createElement('div'); c.id = 'toast-container'; document.body.append(c); }
    c.append(t); setTimeout(() => t.remove(), 3500);
  }

  loadUsers();
</script>
</body>
</html>
